name: Auto pull and run startup preflight

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: haodai-linebot-auto-pull-main
  cancel-in-progress: true

jobs:
  auto_pull_and_preflight:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync working copy to origin/main
        run: |
          git fetch origin main
          git checkout -B main origin/main
          git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run fail-fast startup preflight
        run: python scripts/preflight_check.py --strict

      - name: Byte-compile startup modules
        run: python -m py_compile app.py main.py scripts/preflight_check.py
